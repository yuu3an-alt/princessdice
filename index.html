<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>DICE PRINCESS 〜魔王城脱出記〜</title>
<style>
/* ============================================================
   DICE PRINCESS — LAST DUNGEON DICE visual language
   cream / ink-navy / gate-teal / signal-orange / abyss-purple
============================================================ */
:root{
  --cream:#F2EEE3;
  --cream2:#EAE4D4;
  --ink:#16323F;
  --ink2:#1E4152;
  --teal:#2FB4AD;
  --teal-dk:#1E8F8A;
  --sig:#FF4A2D;
  --purple:#4E2650;
  --purple-dk:#361A38;
  --gold:#F0B32C;
  --blue:#2D6FD1;
  --white:#FDFCF8;
  --shadow:0 6px 0 rgba(22,50,63,.16);
  --r:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
html,body{height:100%;overflow:hidden;overscroll-behavior:none;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
  background:var(--ink);
  color:var(--ink);
  touch-action:manipulation;
}
#app{
  position:fixed;inset:0;max-width:520px;margin:0 auto;
  background:var(--cream);
  display:flex;flex-direction:column;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
  overflow:hidden;
  transition:background .5s;
}
#app.enemy-phase{background:#E8DCD4;}
#app.boss-bg{background:#DCD2DE;}
#app.shake{animation:shk .34s;}
@keyframes shk{
  0%,100%{transform:translate(0,0)}
  15%{transform:translate(-7px,3px)}30%{transform:translate(6px,-4px)}
  45%{transform:translate(-5px,-2px)}60%{transform:translate(4px,3px)}
  75%{transform:translate(-3px,1px)}90%{transform:translate(2px,-1px)}
}
@media (prefers-reduced-motion:reduce){
  *{animation-duration:.01s !important;transition-duration:.01s !important;}
}

/* ---------- generic buttons ---------- */
.btn{
  border:none;font-family:inherit;font-weight:800;
  border-radius:var(--r);cursor:pointer;
  color:var(--white);background:var(--ink);
  box-shadow:var(--shadow);
  padding:14px 20px;font-size:16px;letter-spacing:.06em;
  transition:transform .08s,filter .15s;
}
.btn:active{transform:translateY(3px);box-shadow:0 3px 0 rgba(22,50,63,.16);}
.btn.teal{background:var(--teal);}
.btn.sig{background:var(--sig);}
.btn.ghost{background:transparent;color:var(--ink);box-shadow:inset 0 0 0 3px var(--ink);}
.btn:disabled{filter:grayscale(.9) opacity(.45);pointer-events:none;}

/* ============================================================ TITLE */
#title{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
  background:var(--cream);z-index:60;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
}
.hero{
  position:relative;margin-top:2vh;flex:0 0 auto;
  width:min(88vw,380px);max-height:40vh;
}
.hero svg{width:100%;height:auto;display:block;}
.logo{margin-top:12px;text-align:center;line-height:.95;flex:0 0 auto;transform:rotate(-2deg);}
.logo .en{
  font-size:clamp(34px,9.5vw,48px);font-weight:900;letter-spacing:.015em;color:var(--ink);
  text-shadow:4px 4px 0 var(--sig),7px 7px 0 rgba(22,50,63,.15);
}
.logo .sub{
  display:inline-block;margin-top:14px;background:var(--sig);color:var(--white);
  font-weight:800;font-size:14px;letter-spacing:.2em;padding:6px 18px;border-radius:999px;
}
#title .menu{
  margin-top:22px;flex:0 0 auto;
  padding-bottom:calc(30px + env(safe-area-inset-bottom));
  display:flex;flex-direction:column;gap:10px;width:min(74vw,300px);
}
#title .menu .btn{padding:13px 20px;}
#title .gemrow{display:flex;justify-content:center;margin-bottom:2px;}
.gemchip{
  display:inline-flex;align-items:center;gap:6px;background:var(--ink);color:var(--white);
  border-radius:999px;padding:6px 16px;font-weight:800;font-size:14px;
}
.gemchip svg{width:15px;height:15px;}
.ver{position:absolute;bottom:calc(6px + env(safe-area-inset-bottom));right:12px;font-size:10px;font-weight:700;color:rgba(22,50,63,.4);}

/* ============================================================ HUD */
#hud{
  flex:0 0 auto;display:flex;align-items:center;gap:10px;
  padding:10px 14px 6px;
}
#hud .depth{
  background:var(--ink);color:var(--white);font-weight:900;font-size:13px;
  border-radius:8px;padding:5px 10px;letter-spacing:.05em;white-space:nowrap;
}
#hud .hpwrap{flex:1;display:flex;flex-direction:column;gap:3px;}
#hud .hplabel{display:flex;justify-content:space-between;font-size:11px;font-weight:800;color:var(--ink2);}
#hud .hpbar{height:14px;background:rgba(22,50,63,.15);border-radius:999px;overflow:hidden;position:relative;}
#hud .hpbar .fill{
  position:absolute;inset:0;width:100%;border-radius:999px;
  background:linear-gradient(180deg,#43C9C2,var(--teal-dk));
  transition:width .35s cubic-bezier(.22,1,.36,1);
}
#hud .hpbar .fill.low{background:linear-gradient(180deg,#FF7A5C,var(--sig));}
#hud .gems{display:flex;align-items:center;gap:5px;font-weight:900;font-size:15px;color:var(--ink);}
#hud .gems svg{width:16px;height:16px;}
#hud .blockchip{
  display:none;align-items:center;gap:3px;background:var(--blue);color:#fff;
  font-weight:900;font-size:12px;border-radius:999px;padding:4px 9px;
}
#hud .blockchip.on{display:inline-flex;}

/* ============================================================ STAGE / ENEMY */
#stage{flex:1 1 auto;position:relative;display:flex;align-items:center;justify-content:center;min-height:0;perspective:700px;}
.enemyCard{
  position:relative;width:min(64vw,250px);text-align:center;
  transition:opacity .4s;
}
.enemyCard .circle{transform-style:preserve-3d;will-change:transform;animation:eidle 2.8s ease-in-out infinite;}
@keyframes eidle{
  0%,100%{transform:scale(1,1) translateY(0)}
  50%{transform:scale(1.025,.965) translateY(3px)}
}
.enemyCard.atk .circle{animation:eatk .55s cubic-bezier(.45,0,.55,1);}
@keyframes eatk{
  0%{transform:translateY(-12px) rotateX(16deg) scale(.95,1.06)}   /* 溜め:のけぞり */
  40%{transform:translateY(-14px) rotateX(18deg) scale(.93,1.08)}
  62%{transform:translateY(30px) translateZ(60px) rotateX(-12deg) scale(1.16,.9)} /* 突進:手前へ */
  100%{transform:none}
}
.enemyCard.hit .circle{animation:ehit3d .34s cubic-bezier(.2,.8,.3,1);}
@keyframes ehit3d{
  0%{transform:rotateY(20deg) translateX(-10px) translateZ(-30px) scale(.93,1.06);filter:brightness(3) saturate(0)}
  55%{transform:rotateY(-10deg) translateX(7px) scale(1.03,.97)}
  100%{transform:none;filter:none}
}
.enemyCard.dead{opacity:0;}
.enemyCard.dead .circle{animation:edead .5s ease-in forwards;}
@keyframes edead{
  0%{transform:none}
  100%{transform:rotateX(76deg) translateY(46px) scale(.7);filter:grayscale(1)}
}
.enemyCard .circle{
  width:min(46vw,190px);height:min(46vw,190px);margin:0 auto;
  background:var(--white);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 0 rgba(22,50,63,.12), inset 0 0 0 6px rgba(22,50,63,.05);
  position:relative;overflow:visible;
}
.enemyCard .circle svg{width:74%;height:74%;}
.enemyCard .nametag{
  display:inline-flex;align-items:center;gap:8px;margin-top:12px;
  background:var(--ink);color:var(--white);border-radius:10px;
  padding:6px 14px;font-weight:900;font-size:15px;letter-spacing:.08em;
}
.enemyCard .lv{
  background:var(--sig);border-radius:5px;font-size:10px;padding:2px 6px;line-height:1.2;
}
.enemyCard .ehp{margin:10px auto 0;width:78%;}
.enemyCard .ehpbar{height:12px;background:rgba(22,50,63,.16);border-radius:999px;overflow:hidden;position:relative;}
.enemyCard .ehpbar .fill{position:absolute;inset:0;background:linear-gradient(180deg,#FF7A5C,var(--sig));border-radius:999px;transition:width .3s;}
.enemyCard .ehpnum{font-size:12px;font-weight:900;color:var(--ink2);margin-top:4px;display:flex;justify-content:center;gap:8px;}
.enemyCard .eblock{display:none;color:var(--blue);}
.enemyCard .eblock.on{display:inline;}
.dmgnum{
  position:absolute;left:50%;top:32%;z-index:20;pointer-events:none;
  font-weight:900;font-size:52px;color:var(--sig);
  -webkit-text-stroke:2.5px var(--white);
  text-shadow:0 5px 0 rgba(22,50,63,.3);
  transform:translate(-50%,-50%) rotate(-8deg);
  animation:dpop .75s cubic-bezier(.18,1.4,.4,1) forwards;
}
.dmgnum.heal{color:var(--teal);}
.dmgnum.block{color:var(--blue);font-size:38px;}
.dmgnum.onhero{top:auto;bottom:8%;}
@keyframes dpop{
  0%{transform:translate(-50%,-50%) rotate(-8deg) scale(.2);opacity:0}
  18%{transform:translate(-50%,-58%) rotate(-8deg) scale(1.25);opacity:1}
  40%{transform:translate(-50%,-62%) rotate(-6deg) scale(1)}
  75%{opacity:1}
  100%{transform:translate(-50%,-90%) rotate(-4deg) scale(.95);opacity:0}
}
.turnbanner{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  z-index:30;pointer-events:none;
}
.turnbanner span{
  font-weight:900;font-size:26px;letter-spacing:.25em;padding:14px 0;width:100%;text-align:center;
  color:var(--white);
  animation:bnr 1s cubic-bezier(.22,1,.36,1) forwards;
}
.turnbanner.p span{background:linear-gradient(90deg,transparent,rgba(47,180,173,.95),transparent);}
.turnbanner.e span{background:linear-gradient(90deg,transparent,rgba(78,38,80,.95),transparent);}
.turnbanner.lv span{background:linear-gradient(90deg,transparent,rgba(240,179,44,.97),transparent);color:var(--ink);animation-duration:1.1s;}
@keyframes bnr{
  0%{transform:scaleX(0);opacity:0}
  20%{transform:scaleX(1);opacity:1}
  80%{opacity:1}
  100%{opacity:0}
}

/* ============================================================ INTENT */
#intent{
  flex:0 0 auto;display:flex;align-items:center;justify-content:center;gap:8px;
  margin:0 14px 6px;padding:8px 10px;border-radius:12px;
  background:var(--ink);color:var(--white);font-weight:800;font-size:13.5px;
  letter-spacing:.04em;min-height:40px;
}
#intent.warn{background:var(--purple);animation:ipulse 1s infinite;}
@keyframes ipulse{0%,100%{box-shadow:0 0 0 0 rgba(255,74,45,.6)}50%{box-shadow:0 0 0 5px rgba(255,74,45,0)}}
#intent .ival{color:var(--sig);font-size:18px;font-weight:900;}
#intent.warn .ival{color:#FFB199;}

/* ============================================================ DICE */
#dicetray{
  flex:0 0 auto;display:flex;justify-content:center;gap:14px;
  padding:4px 0 10px;min-height:66px;position:relative;
}
.pile{
  position:absolute;top:2px;width:46px;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:2px;
}
.pile.deckp{left:10px;}
.pile.discp{right:10px;}
.pstack{position:relative;width:34px;height:42px;}
.pstack i{
  position:absolute;inset:0;border-radius:6px;display:block;
  background:linear-gradient(160deg,var(--white),#EDE6D2);
  box-shadow:inset 0 0 0 2px var(--ink);
}
.pstack i:nth-child(1){transform:translate(4px,4px);}
.pstack i:nth-child(2){transform:translate(2px,2px);}
.pstack i:nth-child(3)::after{
  content:"";position:absolute;inset:5px;border-radius:3px;
  background:repeating-linear-gradient(45deg,var(--teal) 0 4px,transparent 4px 8px);
  opacity:.5;
}
.pile.discp .pstack i{filter:grayscale(.7);box-shadow:inset 0 0 0 2px rgba(22,50,63,.5);}
.pile.empty .pstack i{background:transparent;box-shadow:inset 0 0 0 2px rgba(22,50,63,.25);}
.pile.empty .pstack i::after{display:none;}
.pcount{
  position:absolute;top:-8px;right:-4px;min-width:19px;height:19px;
  background:var(--sig);color:#fff;border-radius:999px;
  font-size:11px;font-weight:900;line-height:19px;padding:0 4px;
  box-shadow:0 2px 0 rgba(22,50,63,.25);
}
.pile.discp .pcount{background:var(--ink);}
.plabel{font-size:9px;font-weight:900;color:var(--ink2);letter-spacing:.05em;}
.die{
  width:54px;height:54px;border-radius:13px;position:relative;
  background:linear-gradient(160deg,var(--white),#EDE6D2);
  box-shadow:0 5px 0 rgba(22,50,63,.25), inset 0 -3px 0 rgba(22,50,63,.08);
  transition:transform .12s,box-shadow .12s,opacity .2s;
  touch-action:none;
}
.die.dragging{opacity:.25;}
.dragghost{
  position:fixed;width:58px;height:58px;z-index:90;pointer-events:none;
  border-radius:14px;margin:0;
  background:linear-gradient(160deg,var(--white),#EDE6D2);
  box-shadow:0 16px 24px rgba(22,50,63,.4),0 0 0 4px var(--gold);
  transform:scale(1.12);transition:none;
}
.card.droptarget{
  box-shadow:0 4px 0 rgba(22,50,63,.18),0 0 0 3px var(--gold),0 0 16px rgba(240,179,44,.65);
}
.card.dimmed{opacity:.4;filter:grayscale(.5);}
.slot .unx{
  position:absolute;top:-10px;right:-10px;width:21px;height:21px;border-radius:50%;
  background:var(--sig);color:#fff;font-size:14px;font-weight:900;line-height:1;
  display:flex;align-items:center;justify-content:center;
  border:2px solid var(--white);
  box-shadow:0 2px 0 rgba(22,50,63,.3);z-index:2;
}
.ctype.summon{background:var(--gold);color:var(--ink);}
/* 召喚/技名カットイン */
.cutin{
  position:absolute;left:0;right:0;top:46%;z-index:26;pointer-events:none;
  display:flex;align-items:center;justify-content:center;gap:10px;padding:9px 0;
  background:linear-gradient(90deg,transparent,rgba(22,50,63,.94) 16%,rgba(22,50,63,.94) 84%,transparent);
  transform:skewY(-2deg);
  animation:cutin .6s cubic-bezier(.2,1,.3,1) forwards;
}
.cutin.summon{background:linear-gradient(90deg,transparent,rgba(78,38,80,.95) 16%,rgba(78,38,80,.95) 84%,transparent);}
.cutin .face{
  width:46px;height:46px;border-radius:50%;background:var(--white);
  display:flex;align-items:center;justify-content:center;overflow:hidden;flex:0 0 auto;
  box-shadow:0 0 0 3px var(--gold);
}
.cutin .face svg{width:76%;height:76%;}
.cutin .tname{color:#fff;font-weight:900;font-size:17px;letter-spacing:.12em;text-shadow:0 2px 0 rgba(0,0,0,.3);}
.cutin .tsub{color:var(--gold);font-weight:900;font-size:10px;letter-spacing:.2em;display:block;}
@keyframes cutin{
  0%{transform:translateX(-105%) skewY(-2deg);opacity:0}
  22%{transform:translateX(0) skewY(-2deg);opacity:1}
  78%{transform:translateX(0) skewY(-2deg);opacity:1}
  100%{transform:translateX(16%) skewY(-2deg);opacity:0}
}
.flycard{
  position:fixed;z-index:85;margin:0;pointer-events:none;
  transition:transform .45s cubic-bezier(.32,.9,.4,1),opacity .45s ease-in;
  animation:none;
}
.slashfx{
  position:absolute;left:50%;top:30%;width:170px;height:7px;border-radius:4px;
  background:linear-gradient(90deg,transparent,#fff,transparent);
  box-shadow:0 0 14px rgba(255,255,255,.95);
  z-index:22;pointer-events:none;
  animation:slashfx .32s ease-out forwards;
}
@keyframes slashfx{
  0%{transform:translate(-50%,-50%) rotate(-38deg) scaleX(.1);opacity:0}
  30%{opacity:1}
  100%{transform:translate(-50%,-50%) rotate(-38deg) scaleX(1.5);opacity:0}
}
.deckbtn{
  display:flex;align-items:center;gap:4px;
  background:var(--ink);color:var(--white);border-radius:8px;
  padding:5px 9px;font-weight:900;font-size:12px;white-space:nowrap;
}
/* チュートリアルのコーチマーク */
#coach{position:fixed;inset:0;z-index:75;pointer-events:none;}
#coach .spot{
  position:absolute;border-radius:14px;
  box-shadow:0 0 0 9999px rgba(22,50,63,.55);
  border:3px solid var(--gold);
  animation:spotp 1.1s infinite;
}
@keyframes spotp{0%,100%{border-color:var(--gold)}50%{border-color:#fff}}
#coach .bubble{
  position:absolute;left:50%;transform:translateX(-50%);
  width:min(84vw,300px);background:var(--white);border-radius:14px;
  padding:14px 14px 12px;box-shadow:0 6px 0 rgba(22,50,63,.25);
  text-align:center;pointer-events:auto;
  animation:pin .3s cubic-bezier(.22,1.4,.4,1);
}
#coach .bubble.waiting{pointer-events:none;}
#coach .btxt{font-size:13.5px;font-weight:800;color:var(--ink);line-height:1.65;margin-bottom:8px;}
#coach .bnext{padding:9px 30px;font-size:13px;}
#coach .bwait{font-size:11px;font-weight:900;color:var(--sig);letter-spacing:.1em;animation:cready 1s infinite;}
.countb{
  position:absolute;bottom:-7px;right:-5px;background:var(--ink);color:#fff;
  font-size:10px;font-weight:900;border-radius:6px;padding:2px 6px;z-index:2;
  box-shadow:0 2px 0 rgba(22,50,63,.25);
}
#dicetray.n6 .die{width:46px;height:46px;}
#dicetray.n6{gap:8px;}
.firetag{
  position:absolute;top:-12px;left:50%;transform:translateX(-50%);
  background:var(--sig);color:#fff;font-size:9px;font-weight:900;
  padding:3px 9px;border-radius:999px;white-space:nowrap;z-index:3;
  box-shadow:0 2px 0 rgba(22,50,63,.25);
}
.die.sel{
  transform:translateY(-10px) scale(1.08);
  box-shadow:0 10px 0 rgba(22,50,63,.2),0 0 0 4px var(--gold);
}
.die.spent{opacity:0;transform:scale(.4);pointer-events:none;}
.die.locked{filter:grayscale(1) brightness(.75);pointer-events:none;}
.die.locked::after{
  content:"⛓";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:26px;background:rgba(22,50,63,.35);border-radius:13px;color:#fff;
}
.die.rolling{animation:droll .45s cubic-bezier(.3,1.6,.5,1);}
@keyframes droll{0%{transform:translateY(-46px) rotate(-160deg) scale(.6);opacity:0}60%{transform:translateY(4px) rotate(10deg)}100%{transform:none;opacity:1}}
.die .pip{position:absolute;width:10px;height:10px;border-radius:50%;background:var(--ink);}
.die.v1 .pip{background:var(--sig);width:13px;height:13px;}

/* ============================================================ HAND (physical card anatomy) */
#handwrap{flex:0 0 auto;padding:0 8px 6px;}
#hand{
  display:flex;gap:8px;overflow-x:auto;overflow-y:visible;
  padding:30px 6px 8px;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
#hand::-webkit-scrollbar{display:none;}
.card{
  flex:0 0 108px;min-height:150px;position:relative;
  background:var(--white);border-radius:11px;
  box-shadow:0 4px 0 rgba(22,50,63,.18), inset 0 0 0 1px rgba(22,50,63,.08);
  padding:6px 6px 7px;display:flex;flex-direction:column;align-items:center;
  transition:transform .14s,box-shadow .14s;
}
.card.ready{
  transform:translateY(-6px);
  box-shadow:0 9px 0 rgba(22,50,63,.15),0 0 0 3px var(--sig),0 0 18px rgba(255,74,45,.55);
  animation:cready .9s infinite;
}
@keyframes cready{0%,100%{box-shadow:0 9px 0 rgba(22,50,63,.15),0 0 0 3px var(--sig),0 0 12px rgba(255,74,45,.4)}50%{box-shadow:0 9px 0 rgba(22,50,63,.15),0 0 0 3px var(--sig),0 0 26px rgba(255,74,45,.8)}}
.card.ng{animation:cng .3s;}
@keyframes cng{0%,100%{transform:none}25%{transform:translateX(-6px)}55%{transform:translateX(6px)}80%{transform:translateX(-3px)}}
.card .cname{
  font-size:11px;font-weight:900;letter-spacing:.06em;color:var(--ink);
  width:100%;text-align:center;padding-right:14px;line-height:1.2;
}
.card .ctype{
  position:absolute;top:-5px;right:-3px;
  background:var(--sig);color:#fff;font-size:9px;font-weight:900;
  padding:3px 5px 4px;border-radius:4px;line-height:1;
  clip-path:polygon(0 0,100% 0,100% 100%,50% 82%,0 100%);
  min-height:22px;
}
.card .ctype.skill{background:var(--blue);}
.card .ctype.manip{background:var(--purple);}
.card .cicon{
  width:44px;height:44px;border-radius:50%;margin:3px 0 2px;
  background:var(--cream2);display:flex;align-items:center;justify-content:center;
}
.card .cicon svg{width:70%;height:70%;}
.card .slots{display:flex;gap:4px;align-items:center;margin:2px 0;}
.slot{
  width:26px;height:26px;border-radius:7px;position:relative;
  background:var(--white);
  box-shadow:inset 0 0 0 2px var(--ink);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:900;color:var(--ink2);
}
.slot.filled{box-shadow:inset 0 0 0 2px var(--teal);background:#E4F5F4;}
.slot.hint{animation:shint .8s infinite;}
@keyframes shint{0%,100%{box-shadow:inset 0 0 0 2px var(--ink)}50%{box-shadow:inset 0 0 0 3px var(--gold)}}
.slot .mini{position:absolute;inset:2px;}
.card .grouplabel{font-size:8.5px;font-weight:800;color:var(--ink2);letter-spacing:.02em;margin-top:1px;}
.card .cdesc{
  margin-top:auto;width:100%;
  border:2px solid var(--blue);border-radius:6px;
  font-size:8.6px;font-weight:700;color:var(--ink);
  padding:3px 3px;text-align:center;line-height:1.35;background:#FAFDFF;
  min-height:32px;display:flex;align-items:center;justify-content:center;
}
.card.manipcard .cdesc{border-color:var(--purple);}

/* ============================================================ CONTROLS */
#controls{
  flex:0 0 auto;display:flex;align-items:stretch;gap:8px;
  padding:2px 12px 12px;
}
#controls .btn{flex:1;font-size:14px;padding:13px 6px;border-radius:13px;}
#btnReroll{background:var(--purple);}
#btnReroll small{display:block;font-size:10px;font-weight:700;opacity:.85;margin-top:1px;}
#btnEnd{background:var(--teal);}
#turnpip{
  flex:0 0 52px;display:flex;align-items:center;justify-content:center;
  border-radius:13px;background:rgba(22,50,63,.08);
}
#turnpip .lamp{
  width:34px;height:34px;border-radius:50%;background:var(--teal);box-shadow:0 0 10px var(--teal);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:14px;font-weight:900;
}
#turnpip .lamp::after{content:"姫";}
#app.enemy-phase #turnpip .lamp{background:var(--purple);box-shadow:0 0 10px var(--purple);}
#app.enemy-phase #turnpip .lamp::after{content:"敵";}

/* ============================================================ OVERLAY (rewards / map / shops / events) */
#overlay{
  position:absolute;inset:0;z-index:70;display:none;
  background:rgba(22,50,63,.55);
  backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
  align-items:center;justify-content:center;
}
#overlay.show{display:flex;}
.panel{
  width:min(92vw,400px);max-height:82vh;overflow-y:auto;
  background:var(--cream);border-radius:20px;
  padding:20px 16px 18px;
  box-shadow:0 12px 0 rgba(0,0,0,.25);
  animation:pin .35s cubic-bezier(.22,1.4,.4,1);
  -webkit-overflow-scrolling:touch;
}
@keyframes pin{0%{transform:translateY(40px) scale(.92);opacity:0}100%{transform:none;opacity:1}}
.panel h2{
  text-align:center;font-size:19px;font-weight:900;letter-spacing:.14em;color:var(--ink);
  margin-bottom:4px;
}
.panel .plead{text-align:center;font-size:12px;font-weight:700;color:var(--ink2);margin-bottom:14px;}
.pickrow{display:flex;gap:8px;justify-content:center;}
.pickrow .card{flex:0 0 31%;min-height:158px;}
.pickrow .card:active{transform:scale(.96);}
.panel .actions{display:flex;gap:10px;margin-top:16px;}
.panel .actions .btn{flex:1;}
.rarebadge{
  position:absolute;top:-7px;left:-5px;background:var(--gold);color:var(--ink);
  font-size:8.5px;font-weight:900;border-radius:5px;padding:2px 6px;z-index:2;
  box-shadow:0 2px 0 rgba(22,50,63,.2);
}
/* map doors */
.doors{display:flex;gap:10px;justify-content:center;}
.door{
  flex:1;max-width:120px;background:var(--white);border-radius:14px;
  padding:14px 8px 12px;text-align:center;
  box-shadow:0 5px 0 rgba(22,50,63,.18);
  transition:transform .1s;
}
.door:active{transform:translateY(3px);}
.door .arch2{
  width:56px;height:64px;margin:0 auto 8px;border-radius:999px 999px 0 0;
  display:flex;align-items:center;justify-content:center;font-size:26px;
  background:var(--teal);color:#fff;position:relative;
}
.door.d-battle .arch2{background:var(--ink);}
.door.d-elite .arch2{background:var(--purple);}
.door.d-rest .arch2{background:var(--gold);}
.door.d-shop .arch2{background:var(--teal);}
.door.d-event .arch2{background:var(--sig);}
.door.d-boss .arch2{background:var(--purple-dk);}
.door .dname{font-size:12.5px;font-weight:900;color:var(--ink);letter-spacing:.05em;}
.door .dsub{font-size:9.5px;font-weight:700;color:var(--ink2);margin-top:2px;line-height:1.3;}
.progress{
  display:flex;align-items:center;justify-content:center;gap:4px;margin:2px 0 16px;
}
.progress .pstep{width:9px;height:9px;border-radius:50%;background:rgba(22,50,63,.18);}
.progress .pstep.done{background:var(--teal);}
.progress .pstep.cur{background:var(--sig);transform:scale(1.35);}
.progress .pstep.boss{width:13px;height:13px;border-radius:3px;transform:rotate(45deg);}
.progress .pstep.boss.cur{transform:rotate(45deg) scale(1.25);}
/* shop rows */
.shoprow{
  display:flex;align-items:center;gap:10px;background:var(--white);
  border-radius:12px;padding:10px 12px;margin-bottom:8px;
  box-shadow:0 3px 0 rgba(22,50,63,.12);
}
.shoprow .sinfo{flex:1;min-width:0;}
.shoprow .sname{font-size:13.5px;font-weight:900;color:var(--ink);}
.shoprow .sdesc{font-size:10.5px;font-weight:700;color:var(--ink2);line-height:1.35;}
.shoprow .btn{padding:9px 12px;font-size:13px;flex:0 0 auto;min-width:74px;}
.shoprow.sold{opacity:.45;}
/* dice event */
.bigdie{
  width:110px;height:110px;border-radius:24px;margin:6px auto 12px;position:relative;
  background:linear-gradient(160deg,var(--white),#EDE6D2);
  box-shadow:0 9px 0 rgba(22,50,63,.25);
}
.bigdie .pip{position:absolute;width:20px;height:20px;border-radius:50%;background:var(--ink);}
.bigdie.rolling{animation:droll .5s cubic-bezier(.3,1.6,.5,1);}
/* deck list for removal */
.decklist{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
.decklist .card{flex:0 0 30%;min-height:150px;}
/* manip targeting */
#manipveil{
  position:absolute;inset:0;z-index:40;display:none;
  background:rgba(22,50,63,.35);
}
#manipveil.show{display:block;}
#manipveil .msg{
  position:absolute;left:0;right:0;bottom:36%;text-align:center;
  color:#fff;font-weight:900;font-size:16px;letter-spacing:.12em;
  text-shadow:0 2px 6px rgba(0,0,0,.5);
}
#app.targeting #dicetray{position:relative;z-index:45;}
#app.targeting .die:not(.locked):not(.spent){animation:shint2 .7s infinite;}
@keyframes shint2{0%,100%{box-shadow:0 5px 0 rgba(22,50,63,.25)}50%{box-shadow:0 5px 0 rgba(22,50,63,.25),0 0 0 4px var(--gold)}}
.pmchoice{
  position:absolute;z-index:46;display:flex;gap:8px;
  left:50%;transform:translateX(-50%);
}
.pmchoice button{
  width:52px;height:44px;border:none;border-radius:12px;font-size:19px;font-weight:900;
  background:var(--gold);color:var(--ink);box-shadow:0 4px 0 rgba(22,50,63,.3);
}
/* result screens */
.resultface{width:130px;height:130px;border-radius:50%;background:var(--white);margin:4px auto 12px;display:flex;align-items:center;justify-content:center;box-shadow:0 7px 0 rgba(22,50,63,.14);}
.resultface svg{width:72%;height:72%;}
.bignum{text-align:center;font-size:44px;font-weight:900;color:var(--sig);line-height:1;}
.bignum small{font-size:13px;color:var(--ink2);display:block;font-weight:800;margin-top:4px;letter-spacing:.1em;}
.fade-in{animation:fin .5s;}
@keyframes fin{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>

</div>

/* localStorage は使えない環境でも動くように保護(iOS Safari では永続化) */
const store = {
  mem:{},
  get(k,def){ try{const v=localStorage.getItem(k);return v==null?def:JSON.parse(v);}catch(e){return (k in this.mem)?this.mem[k]:def;} },
  set(k,v){ try{localStorage.setItem(k,JSON.stringify(v));}catch(e){} this.mem[k]=v; },
};

/* ============================================================
   AUDIO — Web Audio 合成SFX
============================================================ */
const AudioSys = {
  ctx:null, unlocked:false,
  unlock(){ if(this.unlocked)return; try{ this.ctx=new (window.AudioContext||window.webkitAudioContext)(); this.unlocked=true; }catch(e){} },
  tone(f,dur=.1,type="square",vol=.12,slide=0,when=0){
    if(!this.ctx)return;
    const t=this.ctx.currentTime+when;
    const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type=type;o.frequency.setValueAtTime(f,t);
    if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(30,f+slide),t+dur);
    g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);
    o.connect(g);g.connect(this.ctx.destination);o.start(t);o.stop(t+dur+.02);
  },
  noise(dur=.15,vol=.14,when=0){
    if(!this.ctx)return;
    const t=this.ctx.currentTime+when;
    const n=this.ctx.sampleRate*dur,buf=this.ctx.createBuffer(1,n,this.ctx.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*(1-i/n);
    const s=this.ctx.createBufferSource();s.buffer=buf;
    const g=this.ctx.createGain();g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);
    s.connect(g);g.connect(this.ctx.destination);s.start(t);
  },
  tap(){this.tone(660,.05,"square",.07);},
  select(){this.tone(880,.06,"square",.08);},
  place(){this.tone(520,.07,"triangle",.12);this.tone(780,.06,"triangle",.09,0,.05);},
  roll(){for(let i=0;i<4;i++)this.tone(300+rnd(400),.04,"square",.05,0,i*.045);},
  fire(){this.noise(.18,.16);this.tone(200,.22,"sawtooth",.14,-140);},
  hit(){this.noise(.22,.2);this.tone(120,.25,"sawtooth",.16,-70);},
  heal(){this.tone(520,.12,"sine",.12);this.tone(660,.12,"sine",.11,0,.09);this.tone(880,.16,"sine",.1,0,.18);},
  gem(){this.tone(1040,.07,"square",.09);this.tone(1560,.1,"square",.07,0,.06);},
  win(){[523,659,784,1046].forEach((f,i)=>this.tone(f,.16,"square",.11,0,i*.11));},
  lose(){[392,330,262,196].forEach((f,i)=>this.tone(f,.22,"sawtooth",.1,0,i*.16));},
  warn(){this.tone(180,.3,"sawtooth",.13,-60);},
};
window.addEventListener("pointerdown",()=>AudioSys.unlock(),{once:true});

function condLabel(c){
  if(c.t==="any")return "?";
  if(c.t==="max")return "1-"+c.n;
  if(c.t==="min")return c.n+"+";
  if(c.t==="eq") return String(c.n);
  return "?";
}
function groupLabel(g){
  if(!g)return "";
  if(g.t==="pair")return "同じ目を2つ";
  if(g.t==="sum")return "合計 "+g.n+" 以上";
  if(g.t==="consec")return "連番で2つ";
  return "";
}
function checkCond(c,v){
  if(c.t==="any")return true;
  if(c.t==="max")return v<=c.n;
  if(c.t==="min")return v>=c.n;
  if(c.t==="eq") return v===c.n;
  return false;
}
function checkGroup(g,vals){
  if(!g)return true;
  if(g.t==="pair")  return vals[0]===vals[1];
  if(g.t==="sum")   return vals.reduce((a,b)=>a+b,0)>=g.n;
  if(g.t==="consec")return Math.abs(vals[0]-vals[1])===1;
  return true;
}
/* group が満たせる見込みがあるか(最後の1枠を埋める判定) */
function canFinalize(card, tentativeVals){ return checkGroup(card.group, tentativeVals); }

let meta = store.get("dp_meta",{gems:0,up:{hp:0,gem:0,blood:0,dice4:0}});

function metaLv(id){ return meta.up[id]||0; }

let run=null, uidSeq=0;
function newRun(){
  const maxhp=CFG.PLAYER_HP + metaLv("hp")*5;
  run={
    hp:maxhp, maxhp,
    gems: metaLv("gem")*8,
    deck: shuffle(START_DECK.slice()),
    discard:[], hand:[],
    dice:[], step:0,
    block:0, buffX2:false,
    pendingLock:0,
    enemy:null, phase:"map", busy:false,
    rerollHP: metaLv("blood")?1:CFG.REROLL_HP,
    diceN: CFG.DICE + (metaLv("dice4")?1:0),
    lv:1, exp:0, handN:CFG.HAND,
  };
}
/* 姫レベル(純関数群) */
function needExp(lv){ return lv*2; }
function gainExp(n){
  run.exp+=n;
  const ups=[];
  while(run.lv<CFG.LEVEL.MAX && run.exp>=needExp(run.lv)){
    run.exp-=needExp(run.lv);
    run.lv++;
    run.maxhp+=CFG.LEVEL.HP_GAIN;
    run.hp=Math.min(run.maxhp,run.hp+CFG.LEVEL.HP_GAIN);
    let extra="最大HP +"+CFG.LEVEL.HP_GAIN;
    if(run.lv===CFG.LEVEL.HAND_LV){run.handN++;extra+=" / 手札 +1";}
    if(run.lv===CFG.LEVEL.DICE_LV||run.lv===CFG.LEVEL.DICE_LV2){run.diceN++;extra+=" / ダイス +1";}
    ups.push({lv:run.lv,extra});
  }
  return ups;
}

/* ============================================================
   デッキ操作
============================================================ */
function drawHand(){
  // 残った手札は必ず捨て札へ(消滅バグ対策)
  run.hand.forEach(h=>run.discard.push(h.id));
  run.hand=[];
  for(let i=0;i<run.handN;i++){
    if(!run.deck.length){
      if(!run.discard.length)break;
      run.deck=shuffle(run.discard);run.discard=[];
    }
    run.hand.push({uid:++uidSeq,id:run.deck.pop(),placed:[]});
  }
  guaranteeAttack();
  // チュートリアル初回は説明しやすい固定手札
  if(tut&&tut.rig){
    tut.rig=false;
    run.deck=shuffle(["slash","slash","guard","adjust"]);
    run.discard=[];
    run.hand=["slash","guard","adjust","slash","cheat"].map(id=>({uid:++uidSeq,id,placed:[]}));
  }
}
/* 手札に攻撃カードが1枚もなければ、山札/捨て札から1枚を保証交換 */
function guaranteeAttack(){
  if(run.hand.some(h=>CARDS[h.id].type==="atk"))return;
  let src=run.deck, idx=src.findIndex(id=>CARDS[id].type==="atk");
  if(idx<0){src=run.discard;idx=src.findIndex(id=>CARDS[id].type==="atk");}
  if(idx<0||!run.hand.length)return; // デッキに攻撃が存在しない
  const atkId=src.splice(idx,1)[0];
  // 技カードを優先して戻す(操作カードは手数として温存)
  let swapI=run.hand.findIndex(h=>CARDS[h.id].type==="skill");
  if(swapI<0)swapI=rnd(run.hand.length);
  src.push(run.hand[swapI].id);
  run.hand[swapI]={uid:++uidSeq,id:atkId,placed:[]};
}
function discardHand(){
  run.hand.forEach(h=>run.discard.push(h.id));
  run.hand=[];
}
function allDeckIds(){ return run.deck.concat(run.discard, run.hand.map(h=>h.id)); }

    <div class="decklist">${order.map(id=>`
      <div class="card ${CARDS[id].manip?"manipcard":""}">${cardHTML(id,{showRare:true})}<span class="countb">×${counts[id]}</span></div>`).join("")}</div>
    <div class="actions"><button class="btn teal" data-close>閉じる</button></div>`);
  overlay.querySelector("[data-close]").addEventListener("pointerdown",()=>{AudioSys.tap();closePanel();});
}
/* 山札 / 捨て札の中身 */
function showPileView(kind){
  if(run.busy)return;
  AudioSys.tap();
  const ids=kind==="deck"?run.deck:run.discard;
  const title=kind==="deck"?"山札":"捨て札";
  const note=kind==="deck"
    ?"引く順序は秘密 ─ 何が眠っているかだけ確認できる"
    :"使ったカード ─ 山札が尽きるとシャッフルされて戻る";
  const counts={};
  ids.forEach(id=>counts[id]=(counts[id]||0)+1);
  const typeOrder={atk:0,skill:1,manip:2};
  const order=Object.keys(counts).sort((a,b)=>
    (typeOrder[CARDS[a].type]-typeOrder[CARDS[b].type])||((CARDS[a].rare?1:0)-(CARDS[b].rare?1:0)));
  openPanel(`
    <h2>${title} ─ ${ids.length}枚</h2>
    <div class="plead">${note}</div>
    ${ids.length?`<div class="decklist">${order.map(id=>`
      <div class="card ${CARDS[id].manip?"manipcard":""}">${cardHTML(id,{showRare:true})}<span class="countb">×${counts[id]}</span></div>`).join("")}</div>`
    :`<div style="text-align:center;font-weight:900;color:var(--ink2);padding:20px 0">─ 空 ─</div>`}
    <div class="actions"><button class="btn teal" data-close>閉じる</button></div>`);
  overlay.querySelector("[data-close]").addEventListener("pointerdown",()=>{AudioSys.tap();closePanel();});
}

/* ============================================================
   DICE 描画・操作
============================================================ */
function rollDice(){
  run.dice=[];
  for(let i=0;i<run.diceN;i++)run.dice.push({id:i,v:d6(),locked:false,spent:false,placed:null});
  // 呪縛
  let k=run.pendingLock;run.pendingLock=0;
  const free=run.dice.slice();
  while(k>0&&free.length){const d=free.splice(rnd(free.length),1)[0];d.locked=true;k--;}
  AudioSys.roll();
  renderDice(true);
}
function renderDice(rolling=false){
  trayEl.innerHTML="";
  trayEl.classList.toggle("n6",run.dice.length>=6);
  // 山札・捨て札パイル
  const mkPile=(cls,label,count)=>
    `<div class="pile ${cls} ${count===0?"empty":""}" data-pile="${cls}">
      <div class="pstack"><i></i><i></i><i></i><span class="pcount">${count}</span></div>
      <span class="plabel">${label}</span>
    </div>`;
  trayEl.insertAdjacentHTML("beforeend",
    mkPile("deckp","山札",run.deck.length)+mkPile("discp","捨て札",run.discard.length));
  trayEl.querySelector(".deckp").addEventListener("pointerdown",()=>showPileView("deck"));
  trayEl.querySelector(".discp").addEventListener("pointerdown",()=>showPileView("disc"));
  run.dice.forEach(d=>{
    const el=document.createElement("div");
    el.className="die v"+d.v+(d.locked?" locked":"")+(d.spent||d.placed!=null?" spent":"")+(selDie===d.id?" sel":"")+(rolling&&!d.locked?" rolling":"");
    if(rolling)el.style.animationDelay=(d.id*0.06)+"s";
    el.innerHTML=dieFace(d.v);
    el.dataset.id=d.id;
    el.addEventListener("pointerdown",ev=>onDiePointerDown(ev,d,el));
    trayEl.appendChild(el);
  });
}
/* ---------- タップ選択 + ドラッグ&ドロップ ---------- */
const DRAG_THRESH=10, DRAG_LIFT=46;
let drag=null;
function onDiePointerDown(ev,d,srcEl){
  if(run.busy)return;
  if(!d||d.locked||d.spent||d.placed!=null)return;
  if(manipCard){applyManip(d);return;}
  ev.preventDefault();
  drag={die:d,srcEl,sx:ev.clientX,sy:ev.clientY,moved:false,ghost:null};
  const mv=e=>{
    if(!drag)return;
    e.preventDefault();
    if(!drag.moved&&Math.hypot(e.clientX-drag.sx,e.clientY-drag.sy)>DRAG_THRESH)startDragGhost();
    if(drag.moved)moveGhost(e);
  };
  const up=e=>{
    window.removeEventListener("pointermove",mv);
    window.removeEventListener("pointerup",up);
    window.removeEventListener("pointercancel",up);
    if(!drag)return;
    if(drag.moved)endDrag(e);
    else{ // 動かさず離した=タップ選択
      selDie=(selDie===d.id)?null:d.id;
      AudioSys.select();
      renderDice();renderHand();
    }
    drag=null;
  };
  window.addEventListener("pointermove",mv,{passive:false});
  window.addEventListener("pointerup",up);
  window.addEventListener("pointercancel",up);
}
function startDragGhost(){
  drag.moved=true;
  selDie=null;
  drag.srcEl.classList.add("dragging");
  const g=document.createElement("div");
  g.className="die dragghost v"+drag.die.v;
  g.innerHTML=dieFace(drag.die.v);
  document.body.appendChild(g);
  drag.ghost=g;
  AudioSys.select();
  // ドロップ先の可否をカードに表示
  handEl.querySelectorAll(".card").forEach(el=>{
    const h=run.hand.find(x=>String(x.uid)===el.dataset.uid);
    if(!h)return;
    const c=CARDS[h.id];
    const ok=c.manip? run.dice.some(x=>x===drag.die) : dieFitsCard(h,drag.die.v);
    el.classList.toggle("droptarget",ok);
    el.classList.toggle("dimmed",!ok);
    if(ok&&!c.manip){
      const st=handCardState(h);
      const s=el.querySelector(`.slot[data-slot="${st.nextSlot}"]`);
      if(s)s.classList.add("hint");
    }
  });
}
function moveGhost(e){
  const g=drag.ghost;
  g.style.left=(e.clientX-29)+"px";
  g.style.top=(e.clientY-29-DRAG_LIFT)+"px";
  // 手札の端で自動スクロール
  const r=handEl.getBoundingClientRect();
  if(e.clientY>r.top-70&&e.clientY<r.bottom+20){
    if(e.clientX<r.left+56)handEl.scrollLeft-=14;
    else if(e.clientX>r.right-56)handEl.scrollLeft+=14;
  }
}
function endDrag(e){
  if(drag.ghost)drag.ghost.remove();
  drag.srcEl.classList.remove("dragging");
  // ゴーストは指の上方にあるため、指位置と持ち上げ位置の両方で判定
  const hitAt=(x,y)=>{
    const el=document.elementFromPoint(x,y);
    return el?el.closest(".card"):null;
  };
  const cardEl=hitAt(e.clientX,e.clientY-DRAG_LIFT-29)||hitAt(e.clientX,e.clientY);
  let placed=false;
  if(cardEl&&cardEl.classList.contains("droptarget")){
    const h=run.hand.find(x=>String(x.uid)===cardEl.dataset.uid);
    if(h){
      const c=CARDS[h.id];
      if(c.manip){
        manipCard=h;
        if(c.manip==="pm1"){veil.classList.add("show");app.classList.add("targeting");}
        applyManip(drag.die);
        placed=true;
      }
      else placed=placeDieOn(h,drag.die);
    }
  }
  if(!placed&&!manipCard)AudioSys.tap();
  renderDice();renderHand();
}

/* ============================================================
   HAND 描画・スロット配置
============================================================ */
function cardHTML(cid, opts={}){
  const c=CARDS[cid];
  const slotsHTML=c.slots?`<div class="slots">${c.slots.map((s,i)=>{
      const pv=opts.placedVals&&opts.placedVals[i];
      return `<div class="slot ${pv?"filled":""} ${opts.hintSlot===i?"hint":""}" data-slot="${i}">${pv?miniDieSVG(pv)+'<span class="unx">×</span>':condLabel(s)}</div>`;
    }).join("")}</div>`:`<div class="slots"><div class="slot" style="box-shadow:inset 0 0 0 2px var(--purple)">✦</div></div>`;
  return `${opts.ready?'<div class="firetag">タップで発動!</div>':""}${c.rare&&opts.showRare?'<span class="rarebadge">RARE</span>':""}
    <span class="ctype ${c.type} ${c.summon?"summon":""}">${c.summon?"召":c.type==="atk"?"攻":c.type==="skill"?"技":"操"}</span>
    <div class="cname">${c.name}</div>
    <div class="cicon">${SVG[c.icon]||""}</div>
    ${slotsHTML}
    <div class="grouplabel">${groupLabel(c.group)}&nbsp;</div>
    <div class="cdesc">${c.desc.replace(/\n/g,"<br>")}</div>`;
}
function handCardState(h){
  const c=CARDS[h.id];
  if(c.manip)return {ready:false,nextSlot:-1};
  const filled=h.placed.length;
  return {ready:filled>=c.slots.length,nextSlot:filled<c.slots.length?filled:-1};
}
/* このカードに選択中/ドラッグ中のダイスが置けるか(共通判定) */
function dieFitsCard(h,dv){
  const c=CARDS[h.id];
  if(c.manip)return false;
  const st=handCardState(h);
  if(st.nextSlot<0)return false;
  if(!checkCond(c.slots[st.nextSlot],dv))return false;
  const tent=h.placed.map(pid=>run.dice.find(x=>x.id===pid).v).concat([dv]);
  return tent.length<c.slots.length||canFinalize(c,tent);
}
function renderHand(){
  handEl.innerHTML="";
  run.hand.forEach(h=>{
    const c=CARDS[h.id];
    const st=handCardState(h);
    const el=document.createElement("div");
    el.className="card"+(st.ready?" ready":"")+(c.manip?" manipcard":"");
    el.dataset.uid=h.uid;
    const placedVals=h.placed.map(pid=>run.dice.find(d=>d.id===pid).v);
    let hintSlot=-1;
    if(selDie!=null){
      const dv=run.dice.find(d=>d.id===selDie).v;
      if(dieFitsCard(h,dv))hintSlot=st.nextSlot;
    }
    el.innerHTML=cardHTML(h.id,{placedVals,hintSlot,ready:st.ready});
    el.addEventListener("pointerdown",ev=>onCardTap(h,el,ev));
    handEl.appendChild(el);
  });
}
function onCardTap(h,el,ev){
  if(run.busy)return;
  const c=CARDS[h.id];
  AudioSys.tap();
  if(c.manip){ startManip(h); return; }
  const st=handCardState(h);
  // ① 置き済みスロット(×)のタップ → 返却。発動より優先
  const slotEl=ev.target.closest(".slot");
  if(slotEl){
    const idx=parseInt(slotEl.dataset.slot,10);
    if(idx<h.placed.length){
      const back=h.placed.splice(idx);
      back.forEach(pid=>{run.dice.find(d=>d.id===pid).placed=null;});
      AudioSys.tap();
      renderDice();renderHand();
      return;
    }
  }
  // ② 全スロット充填済み → 発動
  if(st.ready){ fireCard(h,el); return; }
  // ③ タップ選択中のダイスを配置
  if(selDie==null){ el.classList.remove("ng");void el.offsetWidth;el.classList.add("ng");return; }
  const d=run.dice.find(x=>x.id===selDie);
  if(!placeDieOn(h,d)){
    el.classList.remove("ng");void el.offsetWidth;el.classList.add("ng");
    AudioSys.tone(160,.12,"sawtooth",.1);
    return;
  }
  selDie=null;
  renderDice();renderHand();
}
/* 配置の共通ルート(タップ/ドラッグ両対応) */
function placeDieOn(h,d){
  if(!dieFitsCard(h,d.v))return false;
  d.placed=h.uid;
  h.placed.push(d.id);
  AudioSys.place();
  tutNotify("place");
  return true;
}

/* ============================================================
   カード発動と効果適用
============================================================ */
async function fireCard(h,el){
  const c=CARDS[h.id];
  const vals=h.placed.map(pid=>run.dice.find(d=>d.id===pid).v);
  run.busy=true;
  AudioSys.fire();
  tutNotify("fire");
  flyCardToEnemy(el);
  showCutin(c);
  await wait(400); // カットインの溜め
  const eff=c.fx(vals);
  // ダイス消費・カード消費
  h.placed.forEach(pid=>{const d=run.dice.find(x=>x.id===pid);d.spent=true;d.placed=null;});
  run.hand=run.hand.filter(x=>x!==h);
  run.discard.push(h.id);
  await applyPlayerEffect(eff);
  renderDice();renderHand();renderHUD();
  run.busy=false;
  if(run.enemy&&run.enemy.hp<=0)onEnemyDefeated();
}
/* 発動カードを固定レイヤーで敵へ飛ばす(手札の枠にクリップされない) */
function flyCardToEnemy(el){
  const r=el.getBoundingClientRect();
  const clone=el.cloneNode(true);
  clone.classList.remove("ready","ng");
  clone.classList.add("flycard");
  clone.style.left=r.left+"px";
  clone.style.top=r.top+"px";
  clone.style.width=r.width+"px";
  document.body.appendChild(clone);
  el.style.visibility="hidden";
  const er=stage.getBoundingClientRect();
  const tx=(er.left+er.width/2)-(r.left+r.width/2);
  const ty=(er.top+er.height*0.32)-r.top;
  requestAnimationFrame(()=>{
    clone.style.transform=`translate(${tx}px,${ty}px) scale(.5) rotate(6deg)`;
    clone.style.opacity="0";
  });
  setTimeout(()=>clone.remove(),500);
}
/* 姫 or 召喚魔物のカットイン */
function showCutin(c){
  const el=document.createElement("div");
  el.className="cutin"+(c.summon?" summon":"");
  const face=c.summon?(SVG[c.icon]||SVG.princess):SVG.princess;
  el.innerHTML=`<div class="face">${face}</div>
    <div><span class="tsub">${c.summon?"SUMMON — 使役":"PRINCESS"}</span><span class="tname">${c.name}</span></div>`;
  stage.appendChild(el);
  setTimeout(()=>el.remove(),640);
}
async function applyPlayerEffect(eff){
  const e=run.enemy;
  if(eff.dmg){
    let dmg=eff.dmg;
    if(run.buffX2){dmg*=2;run.buffX2=false;}
    if(e.block>0){const ab=Math.min(e.block,dmg);e.block-=ab;dmg-=ab;}
    e.hp=Math.max(0,e.hp-dmg);
    const ec=$("#ecard");
    if(ec){ec.classList.remove("hit");void ec.offsetWidth;ec.classList.add("hit");}
    const fx=document.createElement("div");
    fx.className="slashfx";
    stage.appendChild(fx);
    setTimeout(()=>fx.remove(),340);
    spawnDmg(stage,dmg>0?dmg:"BLOCK",dmg>0?"":"block");
    AudioSys.hit();
    updateEnemyBars();
    await wait(dmg>=10?260:140); // 大ダメージほど長いヒットストップ
  }
  if(eff.block){run.block+=eff.block;spawnDmg(stage,"+"+eff.block,"block onhero");}
  if(eff.heal){run.hp=Math.min(run.maxhp,run.hp+eff.heal);spawnDmg(stage,"+"+eff.heal,"heal onhero");AudioSys.heal();}
  if(eff.gems){run.gems+=eff.gems;AudioSys.gem();spawnDmg(stage,"◆+"+eff.gems,"heal onhero");}
  if(eff.buff==="x2"){run.buffX2=true;spawnDmg(stage,"×2!","heal onhero");AudioSys.heal();}
  renderHUD();
}
function spawnDmg(parent,text,cls=""){
  const s=document.createElement("div");
  s.className="dmgnum "+cls;s.textContent=text;
  s.style.left=(42+rnd(16))+"%";
  parent.appendChild(s);
  setTimeout(()=>s.remove(),800);
}

/* ============================================================
   出目操作カード
============================================================ */
function startManip(h){
  const usable=run.dice.some(d=>!d.locked&&!d.spent&&d.placed==null);
  if(!usable){AudioSys.tone(160,.12,"sawtooth",.1);return;}
  manipCard=h;selDie=null;
  app.classList.add("targeting");
  veil.classList.add("show");
  renderDice();renderHand();
}
veil.addEventListener("pointerdown",e=>{if(e.target===veil||e.target.classList.contains("msg"))cancelManip();});
function cancelManip(){
  manipCard=null;
  app.classList.remove("targeting");
  veil.classList.remove("show");
  document.querySelectorAll(".pmchoice").forEach(x=>x.remove());
  renderDice();
}
function applyManip(d){
  const c=CARDS[manipCard.id];
  if(c.manip==="pm1"){
    document.querySelectorAll(".pmchoice").forEach(x=>x.remove());
    const box=document.createElement("div");
    box.className="pmchoice";
    const rect=trayEl.getBoundingClientRect();
    box.style.top=(rect.top-52)+"px";
    box.innerHTML=`<button data-m="-1" ${d.v<=1?"disabled":""}>−1</button><button data-m="+1" ${d.v>=6?"disabled":""}>＋1</button>`;
    box.addEventListener("pointerdown",ev=>{
      const b=ev.target.closest("button");if(!b||b.disabled)return;
      d.v+=parseInt(b.dataset.m,10);
      finishManip();
    });
    document.body.appendChild(box);
    return;
  }
  if(c.manip==="flip")d.v=7-d.v;
  if(c.manip==="set6")d.v=6;
  finishManip();
}
function finishManip(){
  const h=manipCard;
  run.hand=run.hand.filter(x=>x!==h);
  run.discard.push(h.id);
  AudioSys.place();
  cancelManip();
  renderHand();
}

/* ============================================================
   ターンフロー
============================================================ */
function showBanner(who){
  const b=document.createElement("div");
  b.className="turnbanner "+(who==="p"?"p":"e");
  b.innerHTML=`<span>${who==="p"?"姫のターン":"魔王軍のターン"}</span>`;
  stage.appendChild(b);
  setTimeout(()=>b.remove(),CFG.BANNER_MS);
}
async function startPlayerTurn(){
  app.classList.remove("enemy-phase");
  run.block=0;
  showBanner("p");
  await wait(350);
  rollDice();
  drawHand();
  selDie=null;
  renderHand();renderHUD();renderIntent();
  setButtons(true);
  run.busy=false;
  tutNotify("turn");
}
function setButtons(on){
  btnReroll.disabled=!on||run.hp<=run.rerollHP;
  btnEnd.disabled=!on;
}
btnReroll.addEventListener("pointerdown",()=>{
  if(run.busy||btnReroll.disabled)return;
  if(run.hp<=run.rerollHP)return;
  run.hp-=run.rerollHP;
  spawnDmg(stage,run.rerollHP,"onhero");
  app.classList.add("shake");setTimeout(()=>app.classList.remove("shake"),CFG.SHAKE_MS);
  run.dice.forEach(d=>{if(!d.locked&&!d.spent&&d.placed==null)d.v=d6();});
  selDie=null;
  AudioSys.roll();
  renderDice(true);renderHand();renderHUD();
  setButtons(true);
});
btnEnd.addEventListener("pointerdown",async()=>{
  if(run.busy||btnEnd.disabled)return;
  tutNotify("end");
  cancelManip();
  run.busy=true;setButtons(false);
  selDie=null;
  discardHand();renderHand();
  run.dice.forEach(d=>d.spent=true);renderDice();
  await enemyTurn();
});
async function enemyTurn(){
  const e=run.enemy;
  app.classList.add("enemy-phase");
  showBanner("e");
  await wait(CFG.BANNER_MS*0.8);
  const act=e.acts[e.actIdx%e.acts.length];
  e.actIdx++;
  await performEnemyAct(act);
  if(run.hp<=0){onDefeat();return;}
  renderIntent();
  await wait(300);
  await startPlayerTurn();
}
async function performEnemyAct(act){
  const e=run.enemy;
  const ec=$("#ecard");
  if(act.a==="atk"||act.a==="big"){
    const times=act.x||1;
    for(let i=0;i<times;i++){
      if(ec){ec.classList.remove("atk");void ec.offsetWidth;ec.classList.add("atk");}
      await wait(340); // 溜め→突進の発生タイミングに合わせる
      let dmg=act.n;
      if(run.block>0){const ab=Math.min(run.block,dmg);run.block-=ab;dmg-=ab;}
      if(dmg>0){
        run.hp=Math.max(0,run.hp-dmg);
        app.classList.add("shake");setTimeout(()=>app.classList.remove("shake"),CFG.SHAKE_MS);
        AudioSys.hit();
        spawnDmg(stage,dmg,"onhero");
      }else{
        spawnDmg(stage,"BLOCK","block onhero");
        AudioSys.tone(300,.1,"square",.1);
      }
      renderHUD();
      await wait(CFG.ENEMY_ACT_DELAY*0.6);
    }
  }else if(act.a==="guard"){
    e.block+=act.n;updateEnemyBars();
    spawnDmg(stage,"🛡+"+act.n,"block");
    await wait(CFG.ENEMY_ACT_DELAY);
  }else if(act.a==="heal"){
    e.hp=Math.min(e.max,e.hp+act.n);updateEnemyBars();
    spawnDmg(stage,"+"+act.n,"heal");AudioSys.heal();
    await wait(CFG.ENEMY_ACT_DELAY);
  }else if(act.a==="lock"){
    run.pendingLock=act.k;
    spawnDmg(stage,"⛓ 呪縛!","");
    AudioSys.warn();
    await wait(CFG.ENEMY_ACT_DELAY);
  }
}

async function startBattle(eid){
  const base=ENEMIES[eid];
  run.enemy={...base,max:base.hp,hp:base.hp,block:0,actIdx:0,acts:base.acts};
  run.phase="battle";
  run.pendingLock=0;run.block=0;run.buffX2=false;
  app.classList.toggle("boss-bg",!!base.boss);
  setChromeVisible(true);
  renderHUD();renderEnemy();renderIntent();
  trayEl.innerHTML="";handEl.innerHTML="";
  setButtons(false);
  await wait(400);
  await startPlayerTurn();
}
async function onEnemyDefeated(){
  run.busy=true;setButtons(false);
  const e=run.enemy;
  const ec=$("#ecard");
  AudioSys.win();
  await wait(150);
  if(ec)ec.classList.add("dead");
  run.gems+=e.gem;
  const ups=gainExp(e.lv);
  renderHUD();
  await wait(600);
  for(const u of ups){
    const b=document.createElement("div");
    b.className="turnbanner lv";
    b.innerHTML=`<span>LEVEL UP! Lv${u.lv}<small style="display:block;font-size:12px;letter-spacing:.1em;margin-top:3px">${u.extra}</small></span>`;
    stage.appendChild(b);
    AudioSys.win();
    await wait(CFG.BANNER_MS);
    b.remove();
    renderHUD();
  }
  if(e.boss){showVictory();return;}
  showReward(e);
}

============================================================ */
function openPanel(html){overlay.innerHTML=`<div class="panel">${html}</div>`;overlay.classList.add("show");}
function closePanel(){overlay.classList.remove("show");overlay.innerHTML="";}

function rewardChoices(elite){
  const pool=elite?RARE_POOL:COMMON_POOL.concat(rnd(3)===0?RARE_POOL:[]);
  const set=new Set();
  while(set.size<3&&set.size<pool.length)set.add(pick(pool));
  const out=[...set];
  // 3択に攻撃カードを最低1枚保証(防御・回復偏り防止)
  if(!out.some(id=>CARDS[id].type==="atk")){
    const atks=pool.filter(id=>CARDS[id].type==="atk"&&!out.includes(id));
    if(atks.length)out[rnd(out.length)]=pick(atks);
  }
  return out;
}
function showReward(e){
  const choices=rewardChoices(e.elite);
  openPanel(`
    <h2>服 従 !</h2>
    <div class="plead">魔石 ◆${e.gem} を獲得 ─ 倒した魔物を1体、味方として使役できる</div>
    <div class="pickrow">${choices.map((cid,i)=>`<div class="card ${CARDS[cid].manip?"manipcard":""}" data-pick="${i}">${cardHTML(cid,{showRare:true})}</div>`).join("")}</div>
    <div class="actions"><button class="btn ghost" data-skip>使役しない</button></div>`);
  overlay.querySelectorAll("[data-pick]").forEach(el=>{
    el.addEventListener("pointerdown",()=>{
      run.discard.push(choices[parseInt(el.dataset.pick,10)]);
      AudioSys.gem();closePanel();nextStep();
    });
  });
  overlay.querySelector("[data-skip]").addEventListener("pointerdown",()=>{closePanel();nextStep();});
}

/* ---------- マップ(部屋選択) ---------- */
function roomChoicesFor(step){
  // step は「これから入る部屋」(0-index)
  if(step===0)return ["battle"];
  if(step===CFG.TOTAL_STEPS-1)return ["boss"];
  if(CFG.ELITE_STEPS.includes(step+1))return shuffle(["elite","battle",pick(["rest","shop"])]).slice(0,3);
  const pool=["battle","battle","event","rest","shop"];
  const n=2+rnd(2);
  const out=new Set();
  while(out.size<n)out.add(pick(pool));
  return shuffle([...out]);
}
const DOOR_META={
  battle:{icon:"⚔",name:"戦闘",  sub:"魔王軍と交戦<br>技を奪える"},
  elite: {icon:"💀",name:"強敵",  sub:"危険な精鋭<br>レア技を確定入手"},
  rest:  {icon:"🔥",name:"休息所",sub:"回復 or<br>カード削除"},
  shop:  {icon:"⚖",name:"商人",  sub:"魔石で買い物"},
  event: {icon:"？",name:"運命",  sub:"ダイスに委ねる"},
  boss:  {icon:"👑",name:"魔王",  sub:"城門を守る<br>最後の敵"},
};
function progressHTML(){
  let s="";
  for(let i=0;i<CFG.TOTAL_STEPS;i++){
    const cls=i<run.step?"done":(i===run.step?"cur":"");
    s+=`<div class="pstep ${cls} ${i===CFG.TOTAL_STEPS-1?"boss":""}"></div>`;
  }
  return `<div class="progress">${s}</div>`;
}
function nextStep(){
  if(tut){
    tut=null;tutHide();
    openPanel(`
      <h2>チュートリアル完了!</h2>
      <div class="plead">魔物を服従させ、使役する術を覚えた。<br>あとは魔王城からの脱出あるのみ!</div>
      <div class="resultface">${SVG.princess}</div>
      <div class="actions">
        <button class="btn sig" data-go>脱出をはじめる</button>
        <button class="btn ghost" data-tt>タイトルへ</button>
      </div>`);
    overlay.querySelector("[data-go]").addEventListener("pointerdown",()=>{closePanel();beginRun();});
    overlay.querySelector("[data-tt]").addEventListener("pointerdown",()=>{closePanel();showTitle();});
    return;
  }
  run.step++;
  renderHUD();
  if(run.step>=CFG.TOTAL_STEPS)return; // 保険
  showMap();
}
function showMap(){
  run.phase="map";
  setChromeVisible(false);
  app.classList.remove("enemy-phase","boss-bg");
  stage.innerHTML=`<div style="text-align:center;opacity:.35;font-weight:900;letter-spacing:.3em;color:var(--ink)">MAOU CASTLE</div>`;
  const choices=roomChoicesFor(run.step);
  openPanel(`
    <h2>${depthName(run.step)}</h2>
    <div class="plead">進む扉を選べ</div>
    ${progressHTML()}
    <div class="doors">${choices.map((r,i)=>`
      <div class="door d-${r}" data-r="${i}">
        <div class="arch2">${DOOR_META[r].icon}</div>
        <div class="dname">${DOOR_META[r].name}</div>
        <div class="dsub">${DOOR_META[r].sub}</div>
      </div>`).join("")}</div>`);
  overlay.querySelectorAll("[data-r]").forEach(el=>{
    el.addEventListener("pointerdown",()=>{
      AudioSys.tap();closePanel();
      enterRoom(choices[parseInt(el.dataset.r,10)]);
    });

function tierForStep(step){ return step<4?TIER1:TIER2; }
function enterRoom(type){
  if(type==="battle")startBattle(pick(tierForStep(run.step)));
  else if(type==="elite")startBattle("knight");
  else if(type==="boss")startBattle("maou");
  else if(type==="rest")showRest();
  else if(type==="shop")showShop();
  else if(type==="event")showEvent();
}

      </div>

        <div class="sinfo"><div class="sname">カード削除</div><div class="sdesc">デッキから1枚削除</div></div>
        <button class="btn" data-rm ${run.gems<CFG.SHOP.remove?"disabled":""}>◆${CFG.SHOP.remove}</button>
      </div>
      <div class="actions"><button class="btn ghost" data-leave>立ち去る</button></div>`);
    overlay.querySelectorAll("[data-buy]").forEach(b=>b.addEventListener("pointerdown",()=>{
      const s=stock[parseInt(b.dataset.buy,10)];

      run.gems-=s.cost;s.sold=true;run.discard.push(s.cid);AudioSys.gem();renderHUD();render();
    }));
    const bp=overlay.querySelector("[data-potion]");
    bp.addEventListener("pointerdown",()=>{if(potion||run.gems<CFG.SHOP.potion)return;run.gems-=CFG.SHOP.potion;potion=true;run.hp=Math.min(run.maxhp,run.hp+CFG.POTION_HEAL);AudioSys.heal();renderHUD();render();});
    const bh=overlay.querySelector("[data-hp]");

    overlay.querySelector("[data-rm]").addEventListener("pointerdown",()=>{if(run.gems<CFG.SHOP.remove)return;run.gems-=CFG.SHOP.remove;renderHUD();showRemove(()=>render(),false);});

function showEvent(){
  openPanel(`

      openPanel(`<h2>出目は ${v}</h2><div class="plead">${msg}</div><div class="actions"><button class="btn teal" data-ok>進む</button></div>`);

      overlay.querySelectorAll("[data-pick]").forEach(el=>el.addEventListener("pointerdown",()=>{
        run.discard.push(choices[parseInt(el.dataset.pick,10)]);AudioSys.gem();closePanel();nextStep();
      }));
    }
  });
}

function tutShow(){
  if(!tut)return;
  const s=TUT_STEPS[tut.i];
  if(!s){tutHide();return;}
  const tgt=document.querySelector(s.target);
  if(!tgt)return;
  const r=tgt.getBoundingClientRect();
  let c=$("#coach");
  if(!c){c=document.createElement("div");c.id="coach";document.body.appendChild(c);}
  const above=r.top>window.innerHeight*0.5;
  c.innerHTML=`
    <div class="spot" style="left:${r.left-6}px;top:${r.top-6}px;width:${r.width+12}px;height:${r.height+12}px"></div>
    <div class="bubble ${s.wait?"waiting":""}" style="${above?`bottom:${window.innerHeight-r.top+16}px`:`top:${r.bottom+16}px`}">
      <div class="btxt">${s.text}</div>
      ${s.btn?'<button class="btn sig bnext">OK</button>':'<div class="bwait">▲ 実際にやってみよう</div>'}
    </div>`;
  const b=c.querySelector(".bnext");
  if(b)b.addEventListener("pointerdown",()=>{AudioSys.tap();tut.i++;tutShow();});
}
function tutHide(){const c=$("#coach");if(c)c.remove();}
function tutNotify(evt){
  if(!tut)return;
  const s=TUT_STEPS[tut.i];
  if(s&&s.wait===evt){
    tut.i++;
    if(evt==="end")tutHide();  // 敵ターン中は隠し、次の自ターンで再表示
    else tutShow();
  }else if(evt==="turn"){
    tutShow();  // ターン開始で位置を再計算して表示
  }
}

    <div class="menu">
      <div class="gemrow"><span class="gemchip">${SVG.i_gem.replace("<svg",'<svg width="15" height="15"')} 蓄積魔石 ${meta.gems}</span></div>
      <button class="btn sig" id="tStart">脱出をはじめる</button>
      <button class="btn teal" id="tHow">遊び方</button>
      <button class="btn" id="tMeta">王家の強化</button>
      <button class="btn ghost" id="tReset" style="font-size:13px;padding:10px">はじめからやり直す</button>
    </div>
    <div class="ver">v${CFG.VERSION}</div>`;
  $("#tStart").addEventListener("pointerdown",()=>{AudioSys.tap();beginRun();});
  $("#tHow").addEventListener("pointerdown",()=>{AudioSys.tap();showHowTo();});
  $("#tMeta").addEventListener("pointerdown",()=>{AudioSys.tap();showMeta(false);});
  $("#tReset").addEventListener("pointerdown",()=>{AudioSys.tap();showResetConfirm();});
}
/* 遊び方 */
function showHowTo(){
  openPanel(`
    <h2>遊び方</h2>
    <div class="plead">実際に触りながら覚えるのがいちばん早い</div>
    <div class="actions" style="margin:0 0 14px">
      <button class="btn sig" data-tut>チュートリアルをプレイ(約1分)</button>
    </div>
    <div class="shoprow"><div class="sinfo"><div class="sname">⚔ 基本ルール</div>
      <div class="sdesc">毎ターンダイスを振り、カードの枠にはめて発動。敵の予告攻撃をしのぎながら、先にHPを削り切れば勝ち。</div></div></div>
    <div class="shoprow"><div class="sinfo"><div class="sname">🔄 山札と捨て札の巡環</div>
      <div class="sdesc">使ったカードと余った手札は「捨て札」へ。山札が尽きると捨て札が<b>全てシャッフルされて新しい山札に戻る</b>。カードは失われず何度でも再利用される。デッキを薄く保つほど強いカードが早く回ってくる。</div></div></div>
    <div class="shoprow"><div class="sinfo"><div class="sname">🎲 運のねじ伏せ方</div>
      <div class="sdesc">HP2を代償に振り直し。さらに「王家の采配(±1)」「イカサマ(裏返し)」で出目を操作できる。運ゲーではなく手札管理のゲーム。</div></div></div>
    <div class="shoprow"><div class="sinfo"><div class="sname">召 魔物の使役</div>
      <div class="sdesc">倒した魔物は味方カードとして仲間にできる。強敵ほどレアな魔物を従えられる。</div></div></div>
    <div class="shoprow"><div class="sinfo"><div class="sname">👑 姫レベルと周回</div>
      <div class="sdesc">敵撃破でEXP。Lv3で手札+1、Lv5とLv7でダイス+1。倒れても魔石は蓄積され「王家の強化」で姫は強くなっていく。</div></div></div>
    <div class="actions"><button class="btn teal" data-close>閉じる</button></div>`);
  overlay.querySelector("[data-tut]").addEventListener("pointerdown",()=>{AudioSys.tap();startTutorial();});
  overlay.querySelector("[data-close]").addEventListener("pointerdown",()=>{AudioSys.tap();closePanel();});
}
function beginRun(){
  titleEl.style.display="none";
  newRun();
  renderHUD();
  enterRoom("battle"); // 牢屋の扉を吹き飛ばして即戦闘(最初の3分)
}

/* boot */
setChromeVisible(false);
showTitle();
</script>
</body>
</html>
